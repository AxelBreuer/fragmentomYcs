# fRagmentomics configuration file
# =================================
# Edit this file to control runtime behaviour of the Python pipeline.
# All values are case-insensitive.

[bcftools]
# Normalisation backend used by apply_bcftools_norm.
#
# Options
# -------
#   auto        Recommended default.
#               - Windows          → always uses pybcftools (no binary needed)
#               - Linux / macOS    → uses bcftools binary if found on PATH,
#                                    otherwise falls back to pybcftools
#
#   pybcftools  Always use the pure-Python implementation (python/pybcftools/).
#               Cross-platform; no external tool required.
#
#   bcftools    Always use the system bcftools binary.
#               Requires bcftools to be installed and available on PATH.
#               Typical choice for Linux / WSL environments.
#
backend = auto
